<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Quantum Scrapper{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .navbar-brand { font-weight: 700; letter-spacing: .03em; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .badge-running  { background: #ffc107; color: #000; }
    .badge-done     { background: #198754; }
    .badge-error    { background: #dc3545; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-lg">
      <a class="navbar-brand" href="{% url 'index' %}">
        <i class="bi bi-graph-up-arrow me-2"></i>Quantum Scrapper
      </a>
      <div class="d-flex gap-3">
        <a class="nav-link text-white {% block nav_dashboard %}{% endblock %}" href="{% url 'index' %}">
          <i class="bi bi-house me-1"></i>Dashboard
        </a>
        <a class="nav-link text-white {% block nav_ativos %}{% endblock %}" href="{% url 'ativos' %}">
          <i class="bi bi-table me-1"></i>Ativos
        </a>
      </div>
    </div>
  </nav>

  <div class="container-lg pb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
